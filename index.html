<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>無畏艦 V8.0 - 狀態切換系統 (Regime-Switching)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        h2, h3 { color: #4da6ff; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .alert-box { padding: 15px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; font-size: 1.1em; }
        .mode-normal { background: rgba(0, 204, 102, 0.2); border-left: 5px solid #00cc66; color: #00cc66; }
        .mode-mom { background: rgba(255, 80, 80, 0.2); border-left: 5px solid #ff5050; color: #ffcc00; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        th, td { padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>📂 1. 資料匯入 (日度 CSV + 月度 Yahoo)</h2>
        <input type="file" id="csv-upload" accept=".csv" style="margin-bottom: 15px;">
        <br>
        <span id="status-msg" style="color: #ffcc00;">等待上傳完整資料fn.csv...</span>
    </div>

    <div class="panel" id="status-dashboard" style="display: none;">
        <h2>📊 2. 系統狀態判定 (System Regime)</h2>
        <div id="mode-alert" class="alert-box mode-normal">
            當前系統分數：<span id="ui-score" style="font-size: 1.5em; margin: 0 10px;">--</span> 
            | 執行模式：<span id="ui-mode">常態模式 (Normal)</span>
        </div>
        <div style="display: flex; gap: 20px; color: #aaa; font-size: 0.9em;">
            <div>最新 VIX: <span id="ui-vix" style="color:#fff;">--</span></div>
            <div>最新 HY_SPREAD: <span id="ui-hy" style="color:#fff;">--</span></div>
            <div>殖利率曲線 (DGS10-DGS2): <span id="ui-yield" style="color:#fff;">--</span></div>
        </div>
    </div>

    <div class="panel" id="momentum-dashboard" style="display: none; border: 1px solid #ff5050;">
        <h2 style="color: #ff5050;">⚙️ 3. 緊急啟動：MOM 動能防禦模式</h2>
        <p style="color: #aaa; font-size: 0.9em;">由於系統分數低於安全閾值，已強制切換為月度動能跟蹤與防禦機制。</p>
        
        <div style="background: #2a2a2a; padding: 15px; border-radius: 6px; margin-bottom: 15px;">
            <h3 style="color: #4da6ff; border: none; margin-bottom: 5px;">📍 雙重動能雷達 (12個月回溯)</h3>
            <p>當前大盤狀態：<span id="ui-dual-signal" style="padding: 4px 10px; border-radius: 4px; background: #555; font-weight: bold;">計算中...</span></p>
        </div>

        <div style="background: #2a2a2a; padding: 15px; border-radius: 6px;">
            <h3 style="color: #00cc66; border: none; margin-bottom: 5px;">📍 橫截面與時間序列動能矩陣</h3>
            <table>
                <thead>
                    <tr><th>標的</th><th>6 個月動能</th><th>12 個月動能</th><th>趨勢 (TSMOM)</th></tr>
                </thead>
                <tbody id="ui-csmom-body"></tbody>
            </table>
        </div>
    </div>

<script>
const SYSTEM_ETFS = ["VOO", "VTV", "MTUM", "QUAL", "BIL", "TLT"];
let MOM_PRICES = {}; 
let LATEST_MACRO = {}; 

// 設定切換 MOM 模式的分數閾值 (可依您原有系統調整)
const MOM_THRESHOLD = 50; 

// --- 閘口：計算系統特定分數 ---
function calculateSystemScore(macroData) {
    // 【請在此處替換為您原本系統的真實評分公式】
    
    // 以下為展示用邏輯：基於客觀指標的風險扣分法
    let score = 100;
    let vix = parseFloat(macroData['VIX']);
    let hySpread = parseFloat(macroData['HY_SPREAD']);
    let yieldCurve = parseFloat(macroData['DGS10']) - parseFloat(macroData['DGS2']);

    // 根據 Cboe 芝加哥選擇權交易所的波動率指數 (VIX) 定義，VIX > 20 通常代表市場處於較高波動與壓力狀態。(來源: Cboe Volatility Index Methodology)
    if (vix > 20) score -= 20;
    if (vix > 30) score -= 20;

    // 根據 FRED 聯準會經濟數據庫，ICE BofA 美國高收益債選擇權調整利差 (OAS) 大於 5% (500 bps) 通常視為信用緊縮的警戒線。(來源: FRED, ICE BofA US High Yield Index OAS)
    if (hySpread > 5.0) score -= 30;

    // 殖利率曲線倒掛 (短債殖利率高於長債) 往往是衰退的領先指標。
    if (yieldCurve < 0) score -= 10;

    return score;
}

// --- 1. 處理日度 CSV 資料並進行狀態判定 ---
document.getElementById('csv-upload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        const rows = event.target.result.split('\n').map(r => r.trim()).filter(r => r);
        const headers = rows[0].split(',');
        
        // 取得最新一天總經數據
        const lastRow = rows[rows.length - 1].split(',');
        headers.forEach((h, i) => { LATEST_MACRO[h.trim()] = lastRow[i]; });

        // 更新 UI 數據顯示
        document.getElementById('ui-vix').innerText = LATEST_MACRO['VIX'];
        document.getElementById('ui-hy').innerText = LATEST_MACRO['HY_SPREAD'];
        document.getElementById('ui-yield').innerText = (parseFloat(LATEST_MACRO['DGS10']) - parseFloat(LATEST_MACRO['DGS2'])).toFixed(2);
        
        // 執行狀態判定
        const systemScore = calculateSystemScore(LATEST_MACRO);
        document.getElementById('ui-score').innerText = systemScore;
        document.getElementById('status-dashboard').style.display = 'block';

        const alertBox = document.getElementById('mode-alert');
        if (systemScore < MOM_THRESHOLD) {
            // 分數過低：切換至 MOM 模式
            alertBox.className = "alert-box mode-mom";
            document.getElementById('ui-mode').innerText = "⚠️ MOM 動能模式 (分數低於閾值)";
            document.getElementById('status-msg').innerText = "⚠️ 觸發 MOM 模式！正在擷取 ETF 月報...";
            startDataFetch(); // 觸發 Yahoo 月報抓取與動能計算
        } else {
            // 分數安全：維持常態模式
            alertBox.className = "alert-box mode-normal";
            document.getElementById('ui-mode').innerText = "✅ 常態評分模式";
            document.getElementById('status-msg').innerText = "✅ 分數安全，無需啟動 MOM 模式。";
            document.getElementById('momentum-dashboard').style.display = 'none';
            // 這裡可以呼叫您原本系統的「常態模式」功能
        }
    };
    reader.readAsText(file);
});

// --- 2. 擷取月度 Yahoo 資料 (保留 0326 版本邏輯) ---
const PROXIES = ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?"];
async function fetchYfMonthly(ticker) {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=5y&interval=1mo`;
    for (let proxy of PROXIES) {
        try {
            let res = await fetch(proxy + encodeURIComponent(url));
            if (!res.ok) continue;
            let data = await res.json();
            let timestamps = data.chart.result[0].timestamp;
            let closes = data.chart.result[0].indicators.quote[0].close;
            let history = [];
            for(let i=0; i<timestamps.length; i++) {
                if(closes[i] !== null) history.push({ price: closes[i] });
            }
            return history;
        } catch(e) {}
    }
    throw new Error(`無法擷取 ${ticker}`);
}

async function startDataFetch() {
    MOM_PRICES = {};
    try {
        await Promise.all(SYSTEM_ETFS.map(async (ticker) => {
            MOM_PRICES[ticker] = await fetchYfMonthly(ticker);
        }));
        document.getElementById('status-msg').innerText = "✅ MOM 模式計算完成。";
        document.getElementById('momentum-dashboard').style.display = 'block';
        runMomentumEngine();
    } catch (err) {
        document.getElementById('status-msg').innerText = "❌ " + err.message;
    }
}

// --- 3. 計算月度動能 ---
function runMomentumEngine() {
    function getRet(t, m) {
        let d = MOM_PRICES[t];
        if (!d || d.length <= m) return null;
        return (d[d.length - 1].price - d[d.length - 1 - m].price) / d[d.length - 1 - m].price;
    }

    const retVOO = getRet("VOO", 12), retVTV = getRet("VTV", 12), retBIL = getRet("BIL", 12) || 0;
    const dualEl = document.getElementById("ui-dual-signal");
    
    if (retVOO < retBIL && retVTV < retBIL) {
        dualEl.innerText = "DEFENSIVE (避險) - 轉入 TLT"; dualEl.style.background = "#cc0000";
    } else {
        dualEl.innerText = `AGGRESSIVE - 持有 ${retVOO > retVTV ? "VOO" : "VTV"}`; dualEl.style.background = "#009933";
    }

    const tbody = document.getElementById("ui-csmom-body");
    tbody.innerHTML = "";
    SYSTEM_ETFS.forEach(ticker => {
        let ret6m = getRet(ticker, 6), ret12m = getRet(ticker, 12);
        if (ret6m !== null) {
            let tsSignal = (ret12m - retBIL) > 0 ? "LONG" : "CASH";
            let tr = `<tr><td>${ticker}</td><td>${(ret6m*100).toFixed(2)}%</td><td>${(ret12m*100).toFixed(2)}%</td><td>${tsSignal}</td></tr>`;
            tbody.innerHTML += tr;
        }
    });
}
</script>
</body>
</html>
