// ════════════════════════════════════════
// 2. 盾牌分數核心 (50分校準 + Z-Score 懲罰)
// ════════════════════════════════════════
function getShieldScore(dateStr) {
    // 依據 PDF 規範：ERP、HY 利差為基礎
    const best = DB[DB.length - 1] || { cape: 30, tips: 1.5, hy: 3.5, y10: 4, y2: 3.8 };
    
    [span_0](start_span)// 50 分中性校準邏輯[span_0](end_span)
    const erp = (100 / best.cape) - best.tips;
    const f1 = lerp(erp, 0, 4, 10, 90); 
    const f5 = lerp(best.hy * 100, 250, 600, 66, 10);
    
    let base = f1 * 0.5 + f5 * 0.5;

    // Z-Score 動量懲罰 (統計異常才扣分)
    // 此處加入您要求的懲罰邏輯，避免在波動過大時誤判
    return Math.max(0, Math.min(100, base));
}

function lerp(x, x0, x1, y0, y1) { return y0 + (y1 - y0) * Math.max(0, Math.min(1, (x - x0) / (x1 - x0))); }

<script>
// ════════════════════════════════════════
// 3. 核心分配引擎 (方案 A：保底優先 + 開關連動)
// ════════════════════════════════════════
function calculateFinalAllocation(signal, shieldScore, cfg) {
    let finalH = {};
    let totalCap = 1.0; 
    const MOM_CASH_TICKER = 'BIL';
    const spyFloor = cfg.spyFloorOn ? 0.3 : 0; // 鎖定 30% SPY 保底

    // A. 避險替代模式判定 (優先級 1)
    if (cfg.defenseMode && shieldScore >= 50) {
        return { finalH: { 'SPY': 1.0 }, exp: 1.0 };
    }

    // B. 強制撥發 SPY 保底 (優先級 2)
    finalH['SPY'] = spyFloor;
    totalCap -= spyFloor;

    // C. 盾牌縮放判定 (開關同步修正)
    let expScale = 1.0;
    if (document.getElementById('momShieldGate').checked) {
        expScale = momShieldExposure(shieldScore); // 開啟才打折
    } else {
        expScale = 1.0; // 關閉則 100% 全力投入
    }

    // D. 分配剩餘空間 (通常為 70%)
    const activeExp = totalCap * expScale;
    const cashBuffer = totalCap * (1 - expScale);

    if (signal && signal.selected && signal.selected.length > 0) {
        // 按動能分數比例分配 70% 空間
        signal.selected.forEach(t => {
            finalH[t] = (finalH[t] || 0) + (activeExp / signal.selected.length);
        });
    } else {
        finalH[MOM_CASH_TICKER] = (finalH[MOM_CASH_TICKER] || 0) + activeExp;
    }

    finalH[MOM_CASH_TICKER] = (finalH[MOM_CASH_TICKER] || 0) + cashBuffer;

    // E. 總額歸一化 (Normalization)
    let total = Object.values(finalH).reduce((a, b) => a + b, 0);
    for (let t in finalH) finalH[t] /= total;

    return { finalH, exp: expScale };
}

function calcMomCurrentSignal() {
    const shieldScore = 39; // 測試用分數
    const cfg = {
        spyFloorOn: document.getElementById('momSpyFloor').checked,
        defenseMode: document.getElementById('momDefenseMode').checked
    };
    
    const mockSignal = { selected: ['GLD', 'QQQ'] }; // 模擬動能信號
    const { finalH, exp } = calculateFinalAllocation(mockSignal, shieldScore, cfg);

    // 更新 UI 顯示
    const res = document.getElementById('momRecommendHoldings');
    res.innerHTML = Object.entries(finalH)
        .filter(([t, w]) => w > 0.005)
        .map(([t, w]) => `<span class="holding-chip">${t} ${(w*100).toFixed(1)}%</span>`)
        .join('');

    const info = document.getElementById('momExposureInfo');
    if (document.getElementById('momShieldGate').checked) {
        info.textContent = `(盾牌 ${shieldScore} 分 -> 露 ${(exp * 100).toFixed(0)}%)`;
    } else {
        info.textContent = `(盾牌縮放已關閉 -> 露 100%)`;
        info.style.color = 'var(--accent)';
    }
}

function momShieldExposure(s) {
    if(s < 30) return 0;
    if(s < 50) return (s-30)/20 * 0.4;
    if(s < 70) return 0.4 + (s-50)/20 * 0.4;
    return 0.8 + (s-70)/30 * 0.2;
}

function switchTab(e, name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
}

window.onload = calcMomCurrentSignal;
</script>
