<!DOCTYPE html><html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>矛與盾 × 動能策劃 0324 整合版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--surface:#12161f;--surface2:#1a2030;--border:#252d3d;--border-hi:#3a4560;
  --text:#e2eaf8;--muted:#6b7a99;--dim:#3d4a66;
  --green:#00e5a0;--green-dim:#003d2a;--red:#ff4d6d;--red-dim:#3d0012;
  --yellow:#ffb830;--yellow-dim:#3d2900;--blue:#4d9fff;--blue-dim:#001a3d;
  --accent:#7eb8ff;--purple:#b388ff;--purple-dim:#1a0040;--white:#f8faff;
  --orange:#ff8c42;--orange-dim:#3d1a00;--teal:#00d4aa;--teal-dim:#003328;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px;line-height:1.6;font-size:14px}
.mono{font-family:'IBM Plex Mono',monospace}
.wrap{max-width:1200px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border-hi);padding-bottom:16px;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.hdr-title{font-size:20px;font-weight:900;color:var(--white);display:flex;align-items:center;gap:8px}
.hdr-title .v{font-size:12px;font-weight:600;background:var(--accent);color:#000;padding:2px 8px;border-radius:3px}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:3px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;white-space:nowrap}
.tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border:none;border-bottom:3px solid transparent;background:none;transition:.15s;font-family:inherit}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none}.panel.active{display:block}
.step-block{border:1px solid var(--border);margin-bottom:12px;background:var(--surface)}
.step-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.sn1{background:var(--accent);color:#000}.sn2{background:var(--blue);color:#000}
.sn3{background:var(--yellow);color:#000}.sn4{background:var(--green);color:#000}
.snm{background:var(--teal);color:#000}
.step-title{font-weight:700;color:var(--white);font-size:13px}
.step-sub{font-size:11px;color:var(--muted);margin-top:1px}
.step-body{padding:14px}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.field label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
input[type=text],input[type=number],input[type=date],select{
  background:var(--bg);border:1px solid var(--border-hi);color:var(--white);
  padding:7px 9px;border-radius:3px;font-size:13px;font-family:'IBM Plex Mono',monospace;width:100%}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.span2{grid-column:span 2}
button{padding:10px 16px;border:none;border-radius:3px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:.15s;width:100%}
.btn-blue{background:var(--blue);color:#000}.btn-blue:hover{background:#7eb8ff}
.btn-green{background:var(--green);color:#000}.btn-green:hover{background:#00ffb3}
.btn-yellow{background:var(--yellow);color:#000}.btn-yellow:hover{background:#ffd166}
.btn-teal{background:var(--teal);color:#000}.btn-teal:hover{background:#00ffcc}
.btn-outline{background:transparent;border:1px solid var(--border-hi);color:var(--accent)}.btn-outline:hover{border-color:var(--accent)}
.btn-run{background:var(--accent);color:#000;font-size:15px;padding:12px;margin-top:8px}
.stat-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stat-box{background:var(--bg);border:1px solid var(--border);padding:10px 14px;border-radius:3px;flex:1;min-width:140px}
.stat-box .n{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--white)}
.stat-box .s{font-size:11px;color:var(--muted);margin-top:2px}
.upload-label{display:block;background:var(--surface2);border:2px dashed var(--border-hi);padding:12px;text-align:center;cursor:pointer;color:var(--accent);font-weight:700;border-radius:3px;margin-bottom:8px}
.upload-label:hover{border-color:var(--accent)}
input[type=file]{display:none}
#fetchLog{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:8px;min-height:16px;word-break:break-all}
.cfg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.cfg-box{background:var(--surface);border:1px solid var(--border);padding:12px}
.cfg-label{font-size:11px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:8px}
.cfg-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:6px}
.cfg-row input{width:65px;text-align:right}
.cfg-row.wide input{width:110px}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.toggle-row:last-child{border-bottom:none}
.tog{position:relative;width:38px;height:20px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--border-hi);border-radius:10px;transition:.2s;cursor:pointer}
.tog-sl:before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--muted);left:3px;top:3px;transition:.2s}
.tog input:checked+.tog-sl{background:var(--green-dim);border:1px solid var(--green)}
.tog input:checked+.tog-sl:before{transform:translateX(18px);background:var(--green)}
.live-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.live-card{background:var(--surface);border:1px solid var(--border);padding:12px 14px}
.live-label{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.live-main{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.live-score{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.live-delta{text-align:right;font-family:'IBM Plex Mono',monospace}
.score-bar-row{display:flex;gap:6px;margin-top:6px}
.score-bar{flex:1;height:3px;border-radius:2px;background:var(--border)}
.score-bar .fill{height:100%;border-radius:2px}
.db-warn{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;padding:4px 7px;border-radius:3px;background:var(--yellow-dim);border:1px solid var(--yellow);color:var(--yellow)}
.db-clear{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.db-bar{height:4px;border-radius:2px;background:var(--border);margin-top:4px;overflow:hidden}
.db-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.plus-live{margin-top:8px;padding:6px 8px;border-radius:3px;background:var(--blue-dim);border:1px solid var(--blue);font-size:11px;font-family:'IBM Plex Mono',monospace}
.plus-live .pl-title{color:var(--blue);font-weight:700;margin-bottom:3px;font-size:10px}
.plus-live .pl-pnl{font-size:13px;font-weight:700;text-align:right;margin-top:3px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:var(--surface);border:1px solid var(--border);padding:14px}
.m-title{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:10px;text-transform:uppercase}
.m-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;border-bottom:1px dashed var(--border);padding-bottom:3px}
.m-row:last-child{border-bottom:none}
.m-val{font-family:'IBM Plex Mono',monospace;font-weight:700}
.chart-wrap{background:var(--surface);border:1px solid var(--border);padding:14px;margin-bottom:12px}
.chart-title{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:10px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.table-wrap{background:var(--surface);border:1px solid var(--border);overflow-x:auto;margin-bottom:12px;max-height:540px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px;color:var(--muted);text-align:left;background:var(--surface2);position:sticky;top:0;z-index:2}
td{padding:9px;border-bottom:1px solid var(--border)}
.tg{color:var(--green);font-weight:700}.tc{color:var(--accent);font-weight:700}
.tr{color:var(--red);font-weight:700}.ty{color:var(--yellow);font-weight:700}
.tt{color:var(--teal);font-weight:700}
.log-row:hover{background:var(--surface2)}
.loading-overlay{position:fixed;inset:0;background:rgba(10,12,16,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingText{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted)}
.asset-chip{background:var(--surface2);border:1px solid var(--border);padding:6px 10px;border-radius:3px;font-size:11px;font-family:'IBM Plex Mono',monospace;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.15s;user-select:none}
.asset-chip.enabled{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.holding-chip{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-family:monospace;font-weight:700;margin:1px 2px;background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal)}
.holding-chip.cash{background:var(--green-dim);color:var(--green);border-color:var(--green)}
.mom-signal-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;font-family:'IBM Plex Mono',monospace}
.mom-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.mom-bar-fill{height:100%;border-radius:2px;transition:width .4s}
</style>
</head>
<body>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">處理中...</div>
</div>

<div class="wrap">
<div class="hdr">
  <div>
    <div class="hdr-title">🛡️ 矛與盾 × 動能策劃 <span class="v">0324 PRO</span></div>
    <div class="hdr-sub">V9.6 動能輪動 ｜ 相關性過濾 ｜ 壓力測試整合模組</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="storageBadge" style="font-size:11px;padding:3px 10px;border-radius:3px;font-family:monospace;background:var(--surface2);color:var(--muted);border:1px solid var(--border)">💾 --</span>
    <button onclick="clearStorage()" style="font-size:11px;padding:3px 10px;border-radius:3px;background:transparent;border:1px solid var(--border);color:var(--dim);cursor:pointer">🗑</button>
    <div id="dataSourceBadge" style="font-size:12px;padding:4px 12px;border:1px solid var(--border-hi);color:var(--muted);font-family:monospace;">● 初始模式</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(event,'db')">🗄️ 資料庫</button>
  <button class="tab" onclick="switchTab(event,'cfg')">⚙ 回測設定</button>
  <button class="tab" onclick="switchTab(event,'result')">📊 績效與壓力測試</button>
  <button class="tab" onclick="switchTab(event,'mom')">📈 動能輪動</button>
</div>

<div class="panel active" id="panel-db">
  <div class="step-block">
    <div class="step-header"><div class="step-title">🔑 API & 自動抓取</div></div>
    <div class="step-body">
      <div class="grid2" style="margin-bottom:10px">
        <div class="field"><label>FRED API Key</label><input type="text" id="apiFredKey" value="258bf0113f3cc4ec207f3160731c459e"></div>
        <div class="field"><label>Proxy URL</label><input type="text" id="apiProxy" value="https://shield-proxy.depross0205.workers.dev?url="></div>
      </div>
      <div class="grid2">
        <button class="btn-blue" onclick="fetchAndMerge(false)">🔄 完整抓取</button>
        <button class="btn-outline" onclick="fetchAndMerge(true)">⚡ 快速更新</button>
      </div>
      <div id="fetchLog" style="margin-top:10px; font-size:12px;"></div>
    </div>
  </div>
  <div class="step-block">
    <div class="step-header"><div class="step-title">📂 CSV 管理</div></div>
    <div class="step-body">
      <input type="file" id="csvUpload" accept=".csv" onchange="loadCSV(event)">
      <button onclick="document.getElementById('csvUpload').click()" class="upload-label">📂 上傳 Shield Database</button>
      <button class="btn-green" onclick="exportCSV()" style="margin-top:8px">⬇ 匯出資料庫</button>
    </div>
  </div>
</div>

<div class="panel" id="panel-cfg">
  <div class="cfg-grid">
    <div class="cfg-box">
      <div class="cfg-label" style="color:var(--yellow)">方法 A</div>
      <div class="cfg-row"><span>加碼分數 (≥)</span><input type="number" id="cpA150" value="60"></div>
      <div class="cfg-row"><span>清倉分數 (&lt;)</span><input type="number" id="cpA100" value="40"></div>
      <div class="cfg-row"><span>連跌天數</span><input type="number" id="cpADays" value="2"></div>
    </div>
    <div class="cfg-box">
      <div class="cfg-label" style="color:var(--green)">方法 B</div>
      <div class="cfg-row"><span>加碼分數 (≥)</span><input type="number" id="cpB150" value="60"></div>
      <div class="cfg-row"><span>清倉分數 (&lt;)</span><input type="number" id="cpB100" value="40"></div>
    </div>
    <div class="cfg-box">
      <div class="cfg-label">倉位與區間</div>
      <div class="cfg-row"><span>常態倉位</span><input type="number" id="cpPosBase" value="1.0" step="0.1"></div>
      <div class="cfg-row"><span>加碼槓桿</span><input type="number" id="cpPosPlus" value="0.5" step="0.1"></div>
      <div class="cfg-row wide"><span>開始</span><input type="date" id="cpStart" value="2003-05-01"></div>
      <div class="cfg-row wide"><span>結束</span><input type="date" id="cpEnd" value="2026-12-31"></div>
      <button class="btn-run" onclick="runBacktest()">▶ 執行推演</button>
    </div>
  </div>
</div>

<div class="panel" id="panel-result">
  <div class="step-block" style="border-color:var(--red); margin-bottom: 20px;">
    <div class="step-header" style="background:var(--red-dim)">
      <div class="step-title" style="color:var(--red)">🚨 策略壓力測試 (Risk Stress Test)</div>
    </div>
    <div class="step-body">
      <div style="display:flex; gap:10px; margin-bottom:12px; align-items:center;">
        <button class="btn-outline" style="border-color:var(--red); color:var(--red); width:auto;" onclick="runStressReport()">
          ⚡ 執行 Top 5 跌幅區間掃描
        </button>
        <div style="font-size:11px; color:var(--muted)">* 需先完成推演與動能回測</div>
      </div>
      <div id="stressReportTable" class="table-wrap hidden">
        <table>
          <thead>
            <tr style="background:var(--red-dim)">
              <th>歷史事件 / 區間</th>
              <th>天數</th>
              <th style="color:var(--white)">大盤跌幅</th>
              <th style="color:var(--yellow)">A 軌</th>
              <th style="color:var(--green)">B 軌</th>
              <th style="color:var(--accent)">C 軌</th>
              <th style="color:var(--purple)">D 軌</th>
              <th style="color:var(--teal)">MOM</th>
            </tr>
          </thead>
          <tbody id="stressReportBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="live-grid" id="liveDash"></div>
  <div class="metrics-grid" id="metricsGrid"></div>
  <div class="chart-wrap"><canvas id="navChart" height="320"></canvas></div>
  <div class="chart-wrap"><canvas id="ddChart" height="180"></canvas></div>
</div>

<div class="panel" id="panel-mom">
  <div class="cfg-grid">
    <div class="cfg-box" style="border-color:var(--teal)">
      <div class="cfg-label" style="color:var(--teal)">動能參數</div>
      <div class="cfg-row"><span>現金緩衝 (%)</span><input type="number" id="momBuffer" value="0.5" step="0.1"></div>
      <div class="cfg-row"><span>交易成本 (%)</span><input type="number" id="momTradeCost" value="0.1" step="0.05"></div>
      <div class="toggle-row"><span>盾牌縮放</span><label class="tog"><input type="checkbox" id="momShieldGate" checked><span class="tog-sl"></span></label></div>
      <button class="btn-teal" onclick="fetchMomData()" style="margin-top:8px">🌐 抓取 ETF 資料</button>
      <button class="btn-run" onclick="runMomBacktest()" style="background:var(--teal); margin-top:8px">▶ 執行 MOM 回測</button>
    </div>
    <div class="cfg-box" style="border-color:var(--teal); grid-column: span 2;">
      <div class="cfg-label" style="color:var(--teal)">候選標的</div>
      <div id="assetChips" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap:6px;"></div>
    </div>
  </div>
  <div id="momSignalSection" class="hidden">
    <div class="step-block" style="border-color:var(--teal); margin-top:15px;">
      <div class="step-header" style="background:var(--teal-dim)"><div class="step-title">📡 即時信號</div></div>
      <div class="step-body" id="momSignalRows"></div>
    </div>
  </div>
  <div class="chart-wrap"><canvas id="momNavChart" height="300"></canvas></div>
</div>

<script>
'use strict';
// ════ 全域狀態 ════
let DB=[], BT_RESULT=null, MOM_PRICES={}, MOM_RESULT=null, charts={};
const LS_KEY_DB='shield_DB_0324', LS_KEY_PRICES='shield_MOM_PRICES';

const lerp=(x,x0,x1,y0,y1)=>y0+(y1-y0)*Math.max(0,Math.min(1,(x-x0)/(x1-x0)));
const $=id=>document.getElementById(id);
const gv=id=>parseFloat($(id).value)||0;
const gc=id=>$(id).checked;

// ════ 初始化 ════
window.addEventListener('DOMContentLoaded',()=>{
  initAssetChips();
  loadFromStorage();
  updateStatus();
});

const MOM_ASSET_DEFS=[
  {ticker:'SPY',name:'美國大型股',enabled:true},
  {ticker:'QQQ',name:'科技成長',enabled:true},
  {ticker:'VEU',name:'全球ex-US',enabled:true},
  {ticker:'TLT',name:'長債20Y',enabled:true},
  {ticker:'GLD',name:'黃金',enabled:true},
  {ticker:'BIL',name:'現金停泊',enabled:true,isCash:true}
];

function initAssetChips(){
  const wrap=$('assetChips');
  wrap.innerHTML=MOM_ASSET_DEFS.map(a=>
    `<div class="asset-chip ${a.enabled?'enabled':''}" onclick="toggleAsset('${a.ticker}')">${a.ticker}</div>`
  ).join('');
}

function toggleAsset(t){
  const a=MOM_ASSET_DEFS.find(x=>x.ticker===t);
  if(a && !a.isCash) a.enabled=!a.enabled;
  initAssetChips();
}

// ════ 核心邏輯：斷層修復 ════
function fixEWDiscontinuity(){
  if(DB.length<2) return;
  for(let i=1;i<DB.length;i++){
    const r_p=DB[i-1].ew/DB[i-1].sp, r_c=DB[i].ew/DB[i].sp;
    const jump=r_c/r_p;
    if(jump>2.0||jump<0.5){
      for(let j=0;j<i;j++) DB[j].ew=+(DB[j].ew*jump).toFixed(6);
    }
  }
}

// ════ 壓力測試功能 ════
function runStressReport() {
  if (!BT_RESULT) { alert("請先執行回測推演！"); return; }
  const cv = BT_RESULT.cv;
  const periods = identifyWorstPeriods(cv);
  const body = $('stressReportBody');
  body.innerHTML = '';
  $('stressReportTable').classList.remove('hidden');

  periods.forEach(p => {
    const getRet = (k) => {
      const s = cv.find(r => r.d === p.start)?.[k], e = cv.find(r => r.d === p.end)?.[k];
      if (!s || !e) return '--';
      const r = (e/s-1)*100;
      return `<span class="${r >= 0 ? 'tg' : 'tr'}">${r >= 0 ? '+' : ''}${r.toFixed(1)}%</span>`;
    };
    const getMomRet = () => {
      if (!MOM_RESULT) return '<span style="color:var(--dim)">無數據</span>';
      const sM = p.start.slice(0, 7), eM = p.end.slice(0, 7);
      const s = MOM_RESULT.records.find(r => r.month >= sM)?.nav || MOM_RESULT.initial;
      const e = MOM_RESULT.records.find(r => r.month <= eM)?.nav || MOM_RESULT.records[MOM_RESULT.records.length-1].nav;
      const r = (e/s-1)*100;
      return `<span class="${r >= 0 ? 'tt' : 'tr'}">${r >= 0 ? '+' : ''}${r.toFixed(1)}%</span>`;
    };
    const row = `<tr>
      <td class="mono" style="font-size:11px">${p.start} ~ ${p.end}</td>
      <td class="mono">${Math.round((new Date(p.end)-new Date(p.start))/86400000)}d</td>
      <td class="mono tr" style="font-weight:700">${p.drop.toFixed(1)}%</td>
      <td>${getRet('A')}</td><td>${getRet('B')}</td><td>${getRet('C')}</td><td>${getRet('D')}</td><td>${getMomRet()}</td>
    </tr>`;
    body.innerHTML += row;
  });
}

function identifyWorstPeriods(cv) {
  let peak = -Infinity, peakDate = '', drawdowns = [];
  cv.forEach(r => {
    if (r.BH > peak) { peak = r.BH; peakDate = r.d; }
    else drawdowns.push({ start: peakDate, end: r.d, drop: (r.BH/peak-1)*100 });
  });
  drawdowns.sort((a, b) => a.drop - b.drop);
  const results = [];
  for (let d of drawdowns) {
    if (!results.find(x => x.start === d.start) && results.length < 5) results.push(d);
  }
  return results;
}

// ════ 盾牌引擎 ════
function runBacktest(){
  if(DB.length<30) return;
  const start=$('cpStart').value, end=$('cpEnd').value;
  const slice=DB.filter(r=>r.d>=start && r.d<=end);
  const cfg={
    cap:100000,
    A:{s150:gv('cpA150'),s100:gv('cpA100'),clearDays:gv('cpADays')},
    B:{s150:gv('cpB150'),s100:gv('cpB100')}
  };
  
  const cv=[], st={A:{eq:cfg.cap,m:'NORMAL',db:0},B:{eq:cfg.cap,m:'NORMAL',db:0},BH:{eq:cfg.cap}};
  for(let i=1; i<slice.length; i++){
    const ret=(slice[i].sp-slice[i-1].sp)/slice[i-1].sp;
    const f1=lerp(100/slice[i].cape-slice[i].tips, 0, 4, 10, 100);
    const f5=lerp(slice[i].hy*100, 250, 600, 80, 20);
    const score=f1*0.5+f5*0.5;

    // A 軌邏輯
    if(score<cfg.A.s100) st.A.db++; else st.A.db=0;
    const nextMA = score>=cfg.A.s100?'NORMAL':(st.A.db>=cfg.A.clearDays?'CLEAR':'NORMAL');
    st.A.eq *= (1+(st.A.m==='NORMAL'?1:0)*ret);
    st.A.m=nextMA;

    // B 軌邏輯
    const nextMB = score>=cfg.B.s100?'NORMAL':'CLEAR';
    st.B.eq *= (1+(st.B.m==='NORMAL'?1:0)*ret);
    st.B.m=nextMB;

    st.BH.eq = cfg.cap * (slice[i].sp/slice[0].sp);
    cv.push({d:slice[i].d, A:st.A.eq, B:st.B.eq, C:(st.A.eq+st.B.eq)/2, D:(st.A.eq+st.B.eq)/2, BH:st.BH.eq});
  }
  BT_RESULT={cv};
  renderCharts();
}

function renderCharts(){
  const ctx=$('navChart').getContext('2d');
  if(charts.n) charts.n.destroy();
  charts.n = new Chart(ctx, {
    type:'line',
    data:{
      labels: BT_RESULT.cv.map(r=>r.d),
      datasets:[
        {label:'方法 A', data:BT_RESULT.cv.map(r=>r.A), borderColor:'#ffb830', borderWidth:1.5, pointRadius:0},
        {label:'B&H SPY', data:BT_RESULT.cv.map(r=>r.BH), borderColor:'#3d4a66', borderWidth:1, pointRadius:0}
      ]
    },
    options:{ responsive:true, maintainAspectRatio:false, scales:{y:{type:'logarithmic'}} }
  });
}
