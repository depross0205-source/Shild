<script>
// ════════════════════════════════════════
// 【核心修正】方案 A：保底優先 + 開關同步邏輯
// ════════════════════════════════════════

function calculateFinalAllocation(signal, shieldScore, cfg) {
    let finalH = {};
    let totalCap = 1.0; // 總額 100%
    const spyFloor = cfg.spyFloor || 0; // SPY 保底比例 (如 0.3)
    const MOM_CASH_TICKER = 'BIL';

    // 1. 判定「③ 避險替代模式」
    if (cfg.defenseMode && shieldScore >= cfg.defenseThresh) {
        // 盾牌強於門檻 -> 強制 100% SPY，無視其餘設定
        return { 'SPY': 1.0 };
    }

    // 2. 優先預留「② SPY 最低保底」
    finalH['SPY'] = spyFloor;
    totalCap -= spyFloor;

    // 3. 處理「① 盾牌縮放」開關同步問題
    let expScale = 1.0; 
    if (document.getElementById('momShieldGate').checked) {
        // 只有在開關開啟時，才計算曝露打折比例
        expScale = momShieldExposure(shieldScore); 
    } else {
        // 只要開關關閉，曝露比例強鎖定為 100%
        expScale = 1.0; 
    }

    // 4. 計算剩餘空間的分配
    const activeExp = totalCap * expScale;     // 投入 MOM 的實際比例
    const cashBuffer = totalCap * (1 - expScale); // 強制留存的現金比例

    if (signal.selected && signal.selected.length > 0) {
        const scores = signal.selected.map(t => Math.max(signal.scoreMap[t] || 0, 0.001));
        const weights = momWeights(scores);
        
        signal.selected.forEach((t, i) => {
            const w = weights[i] * activeExp;
            finalH[t] = (finalH[t] || 0) + w;
        });
    } else {
        // 若無有效 MOM 標的，空間轉入現金
        finalH[MOM_CASH_TICKER] = (finalH[MOM_CASH_TICKER] || 0) + activeExp;
    }

    // 補足現金緩衝
    finalH[MOM_CASH_TICKER] = (finalH[MOM_CASH_TICKER] || 0) + cashBuffer;

    // 5. 最終歸一化校準 (Normalization)
    let currentTotal = Object.values(finalH).reduce((a, b) => a + b, 0);
    if (Math.abs(currentTotal - 1.0) > 0.0001) {
        for (let t in finalH) finalH[t] /= currentTotal;
    }

    return finalH;
}

// ... (其餘動能計算函數 momWeights, momShieldExposure 保持原樣) ...
</script>

</div>

<script>
// ════════════════════════════════════════
// UI 更新輔助函式
// ════════════════════════════════════════
function updateExposureUI(shieldScore, exp) {
    const info = document.getElementById('momExposureInfo');
    const isGateOn = document.getElementById('momShieldGate').checked;
    
    if (!isGateOn) {
        info.textContent = `(盾牌縮放已關閉 -> 露 100%)`;
        info.style.color = 'var(--accent)';
    } else {
        info.textContent = `(盾牌 ${shieldScore.toFixed(0)} 分 -> 露 ${(exp * 100).toFixed(0)}%)`;
        info.style.color = 'var(--muted)';
    }
}
// ... (其餘 UI 事件如 runBacktest, switchTab 保持原樣) ...
</script>
